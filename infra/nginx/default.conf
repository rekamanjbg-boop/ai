upstream node_backend {
  server api:3000 max_fails=3 fail_timeout=30s;
  keepalive 64;
}

upstream hermes_backend {
  server hermes:8000 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

upstream comfyui_bridge_backend {
  server comfyui-bridge:3100 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
  application/javascript
  application/json
  application/problem+json
  application/xml
  image/svg+xml
  text/css
  text/javascript
  text/plain
  text/xml;

server_tokens off;

server {
  listen 80;
  server_name _;

  client_body_buffer_size 16m;
  client_body_timeout 120s;
  client_max_body_size 512m;
  keepalive_timeout 65s;
  send_timeout 120s;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cross-Origin-Resource-Policy "same-site" always;

  proxy_buffer_size 16k;
  proxy_buffers 16 32k;
  proxy_busy_buffers_size 64k;
  proxy_connect_timeout 10s;
  proxy_http_version 1.1;
  proxy_read_timeout 180s;
  proxy_redirect off;
  proxy_send_timeout 180s;
  proxy_set_header Connection "";
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port $server_port;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Real-IP $remote_addr;

  location = /health {
    proxy_pass http://node_backend;
  }

  location /v1/ws/progress {
    proxy_pass http://node_backend;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location /v1/ {
    proxy_pass http://node_backend;
  }

  location /hermes/ {
    proxy_pass http://hermes_backend/;
    client_max_body_size 128m;
  }

  location /comfyui-bridge/ {
    proxy_pass http://comfyui_bridge_backend/;
    client_max_body_size 512m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location / {
    proxy_pass http://node_backend;
  }
}
