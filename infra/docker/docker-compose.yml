name: ai-media-platform

x-common-env: &common-env
  env_file:
    - ../../.env

x-node-service: &node-service
  build:
    context: ../..
    dockerfile: infra/docker/Dockerfile.node
  <<: *common-env
  networks:
    - media-platform
  restart: unless-stopped

x-worker-deploy: &worker-deploy
  replicas: 1
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 0
  update_config:
    parallelism: 1
    order: start-first

services:
  api:
    <<: *node-service
    command: node apps/api/dist/server.js
    depends_on:
      redis:
        condition: service_healthy
      hermes:
        condition: service_started
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  hermes:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.hermes
    <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - hermes-data:/data/hermes
      - codex-workspaces:/data/codex-workspaces
    networks:
      - media-platform
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  comfyui-bridge:
    <<: *node-service
    command: node apps/comfyui-bridge/dist/server.js
    depends_on:
      redis:
        condition: service_healthy
      storage:
        condition: service_healthy
    environment:
      COMFYUI_BRIDGE_MODE: api
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  ai-generation-worker:
    <<: *node-service
    command: node apps/comfyui-bridge/dist/server.js
    depends_on:
      redis:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    environment:
      COMFYUI_BRIDGE_MODE: worker
    deploy:
      <<: *worker-deploy

  ai-video-worker:
    <<: *node-service
    command: node apps/replicate-video-worker/dist/index.js
    depends_on:
      redis:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    deploy:
      <<: *worker-deploy

  remotion-worker:
    <<: *node-service
    command: node apps/worker/dist/index.js
    depends_on:
      redis:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    environment:
      WORKER_ROLE: remotion
    volumes:
      - media-data:/data/media
      - render-cache:/tmp/remotion
    deploy:
      <<: *worker-deploy

  sync-worker:
    <<: *node-service
    command: node apps/worker/dist/index.js
    depends_on:
      redis:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    environment:
      WORKER_ROLE: sync
    volumes:
      - media-data:/data/media
    deploy:
      <<: *worker-deploy

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    expose:
      - "6379"
    networks:
      - media-platform
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  storage:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - object-storage-data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - media-platform
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || wget -q -O- http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  storage-init:
    image: quay.io/minio/mc:latest
    depends_on:
      storage:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-media-platform}
    networks:
      - media-platform
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://storage:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${S3_BUCKET};
      mc anonymous set none local/$${S3_BUCKET};
      "
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      hermes:
        condition: service_healthy
      comfyui-bridge:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - media-platform
    restart: unless-stopped

networks:
  media-platform:
    driver: bridge

volumes:
  redis-data:
  media-data:
  render-cache:
  nginx-cache:
  hermes-data:
  codex-workspaces:
  object-storage-data:
